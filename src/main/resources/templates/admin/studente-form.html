<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Inserimento Studente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            padding-top: 40px;
            position: relative;
        }

        /* --- BOTTONE INDIETRO --- */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #4a74f5;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.3s;
        }

        /* Animazione freccia */
        .back-btn .arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        /* Freccia si sposta a sinistra al passaggio */
        .back-btn:hover .arrow {
            transform: translateX(-5px);
        }

        .back-btn:hover {
            background: #3b5ed1;
        }

        /* --- CARD --- */
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 18px;
            border-radius: 12px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4a74f5;
            color: white;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #3b5ed1;
        }
    </style>
</head>
<body>


<a class="back-btn" th:href="@{/studente}">
    <span class="arrow">👈</span> Indietro
</a>

<div class="card">
<h1>Inserisci Studente</h1>

<form th:action="@{/studente/salva}" th:object="${studente}" method="post">

    <label>Nome:</label>
    <input type="text" th:field="*{nome}" />

    <label>Cognome:</label>
    <input type="text" th:field="*{cognome}" />

    <label>Matricola:</label>
    <input type="text" th:field="*{matricola}" />
	<label>Codice fiscale:</label>
	<input type="text" th:field="*{codiceFiscale}" />
	<label>Data nascita:</label>
	<input type="date" th:field="*{dataNascita}" />

    <button type="submit">Invia</button>

</form>
</div>

</body>
</html>
