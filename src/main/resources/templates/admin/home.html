<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home Admin</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b')
                no-repeat center center / cover;
            color: #f2f2f2;
        }

        .menu-card {
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .menu-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .menu-icon {
            font-size: 3rem;
        }
    </style>
</head>

<body>

<div class="container text-center d-flex flex-column justify-content-center"
     style="min-height: 100vh;">

    <!-- LOGOUT -->
    <div class="position-absolute top-0 end-0 m-4">
        <a th:href="@{/account/logout}" class="btn btn-outline-light">
            Logout
        </a>
    </div>

    <h1 class="mb-5 fw-bold">Benvenuto Admin</h1>

    <div class="row justify-content-center g-4">

        <!-- STUDENTI -->
        <div class="col-md-3">
            <div class="card menu-card shadow-lg rounded-4 p-4"
                 th:onclick="|location.href='@{/studente}'|">
                <div class="menu-icon mb-3">👨‍🎓</div>
                <h4>Gestisci Studenti</h4>
            </div>
        </div>

        <!-- PROFESSORI -->
        <div class="col-md-3">
            <div class="card menu-card shadow-lg rounded-4 p-4"
                 th:onclick="|location.href='@{/professore}'|">
                <div class="menu-icon mb-3">👨‍🏫</div>
                <h4>Gestisci Professori</h4>
            </div>
        </div>

        <!-- REGISTRO -->
        <div class="col-md-3">
            <div class="card menu-card shadow-lg rounded-4 p-4"
                 th:onclick="|location.href='@{/registro/home}'|">
                <div class="menu-icon mb-3">📘</div>
                <h4>Gestisci Registro</h4>
            </div>
        </div>

    </div>

</div>

</body>
</html>
