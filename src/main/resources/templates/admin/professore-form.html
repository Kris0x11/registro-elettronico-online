<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inserimento Professore</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<!-- BOTTONE INDIETRO -->
<a th:href="@{/professore}"
   class="btn btn-outline-primary position-absolute top-0 start-0 m-4">
    ← Indietro
</a>

<div class="container d-flex justify-content-center align-items-start mt-5">

    <div class="card shadow-lg rounded-4 p-4" style="width: 450px;">
        <h2 class="text-center mb-4">Inserisci Professore</h2>

        <form th:action="@{/professore/salva}"
              th:object="${professore}"
              method="post">

            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control"
                       th:field="*{nome}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cognome</label>
                <input type="text" class="form-control"
                       th:field="*{cognome}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Materia</label>
                <input type="text" class="form-control"
                       th:field="*{materia}">
            </div>

            <div class="mb-3">
                <label class="form-label">Codice Fiscale</label>
                <input type="text" class="form-control"
                       th:field="*{codiceFiscale}">
            </div>

            <div class="mb-3">
                <label class="form-label">Matricola</label>
                <input type="text" class="form-control"
                       th:field="*{matricola}">
            </div>

            <div class="mb-3">
                <label class="form-label">Titoli di studio</label>
                <select class="form-select"
                        th:field="*{titoli}"
                        multiple size="5">
                    <option th:each="titolo : ${setTitoli}"
                            th:value="${titolo.id}"
                            th:text="${titolo.descrizione + ' (' + titolo.tipo + ')'}">
                    </option>
                </select>
                <div class="form-text">
                    Usa CTRL (o CMD su Mac) per selezione multipla
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Data di nascita</label>
                <input type="date" class="form-control"
                       th:field="*{dataNascita}">
            </div>

            <button type="submit"
                    class="btn btn-primary w-100 py-2">
                Salva Professore
            </button>

        </form>
    </div>
</div>

</body>
</html>
