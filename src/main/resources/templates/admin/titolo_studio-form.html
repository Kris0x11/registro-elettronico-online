<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inserimento Titolo di Studio</title>
</head>
<body>

<h1>Nuovo Titolo di Studio</h1>

<form th:action="@{/titolo/salva}" th:object="${titolo}" method="post">

    <label>Nome del titolo:</label>
    <input type="text" th:field="*{descrizione}" required /> <br>
	<Label>Tipo titolo: <input type="text" th:field="*{tipo}" required />
    <br><br>

    <button type="submit">Salva</button>
</form>

</body>
</html>
