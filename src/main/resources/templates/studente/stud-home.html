<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Studente</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
        }

        h2 {
            color: #555;
            margin-bottom: 30px;
        }

        .action-btn {
            width: 220px;
            padding: 14px;
            margin: 10px 0;
            background: #4a74f5;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #3b5ed1;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 10px;
            background-color: #f0f0f0;
            width: 100%;
        }

        header button {
            padding: 5px 10px;
            background-color: #ff4a4a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        header button:hover {
            background-color: #d13b3b;
        }
    </style>
</head>

<body>
    <header>
        <form th:action="@{/account/login}" method="get">
            <button type="submit">Logout</button>
        </form>
    </header>

    <h1>Benvenuto Studente</h1>
    <h2 th:text="${studente.nome} + ' ' + ${studente.cognome}">Nome Cognome</h2>

    <div>
        <a th:href="@{/userStudente/mostra/voto}">
            <button class="action-btn">Mostra Voti</button>
        </a>
        <a th:href="@{/userStudente/mostra/sanzione}">
            <button class="action-btn">Mostra Sanzioni</button>
        </a>
        <a th:href="@{/userStudente/mostra/presenza}">
            <button class="action-btn">Mostra Presenze</button>
        </a>
    </div>

</body>
</html>
