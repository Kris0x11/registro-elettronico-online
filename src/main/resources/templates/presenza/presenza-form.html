<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Appello Classe</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .radio-cell { 
            text-align: center; 
            width: 100px; 
        }
        .radio-cell input[type="radio"] { 
            transform: scale(1.3); 
            cursor: pointer; 
        }
        .submit-container { 
            margin-top: 25px; 
            display: flex; 
            gap: 15px; 
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="back-btn">Torna indietro</a>

    <h1>Registro Scolastico</h1>
    <h2 th:text="'Appello Classe: ' + ${nomeClasse}">Appello Classe</h2>
    
    <div th:if="${messaggioSuccesso}" class="alert-success" th:text="${messaggioSuccesso}">
        Presenze salvate con successo!
    </div>

    <form th:action="@{/presenza/salva}" method="post" style="width: 80%; display: flex; flex-direction: column; align-items: center;">
        
        <input type="hidden" name="nomeClasse" th:value="${nomeClasse}" />

        <table>
            <thead>
                <tr>
                    <th>Cognome</th>
                    <th>Nome</th>
                    <th class="radio-cell">Presente</th>
                    <th class="radio-cell">Assente</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="studente, iterStat : ${studenti}">
                    <input type="hidden" name="studentiId" th:value="${studente.id}" />
                    
                    <td th:text="${studente.cognome}">Cognome</td>
                    <td th:text="${studente.nome}">Nome</td>
                    
                    <td class="radio-cell">
                        <input type="radio" 
                               th:name="'stato_' + ${studente.id}" 
                               value="true" 
                               checked /> </td>
                    
                    <td class="radio-cell">
                        <input type="radio" 
                               th:name="'stato_' + ${studente.id}" 
                               value="false" />
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="submit-container">
            <button type="submit" class="home-btn btn-primary" style="margin-top:0;">Salva Presenze</button>
        </div>
    </form>

</body>
</html>
