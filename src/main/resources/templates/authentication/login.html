<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            padding-top: 40px;
            position: relative;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 18px;
            border-radius: 12px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4a74f5;
            color: white;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #3b5ed1;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Login</h1>

    <form th:action="@{/account/login}" method="post">

        <label>Username:</label>
        <input type="text" name="username" required />

        <label>Password:</label>
        <input type="password" name="password" required />

        <button type="submit">Accedi</button>
    </form>

    <p th:if="${errore}" th:text="${errore}" style="color:red"></p>
</div>

</body>
</html>
