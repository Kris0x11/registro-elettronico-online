spring.application.name=Registro
server.port=8095

# 1. Connessione corretta a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/registro_elettronico?serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Credenziali (OBBLIGATORIE per MySQL)
# Se non hai messo la password su Workbench, lasciala vuota dopo l'uguale
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

